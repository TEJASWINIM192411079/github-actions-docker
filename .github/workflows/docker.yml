name: Docker CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.teju00 }}
        password: ${{ secrets.HarryPotter12345 }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.teju00 }}/github-actions-app:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.teju00 }}/github-actions-app:latest